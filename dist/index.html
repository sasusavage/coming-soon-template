<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="We're launching soon! Drop your number to get notified." />
        <meta name="author" content="" />
        <title>Coming Soon</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Font Awesome icons (free version)-->
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts-->
        <link rel="preconnect" href="https://fonts.gstatic.com" />
        <link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&amp;display=swap" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
        <style>
            .phone-input-group {
                display: flex;
                align-items: center;
                gap: 0;
            }
            .phone-prefix {
                background: rgba(255, 255, 255, 0.15);
                border: 1px solid rgba(255, 255, 255, 0.25);
                border-right: none;
                border-radius: 0.375rem 0 0 0.375rem;
                color: #fff;
                padding: 0.6rem 0.75rem;
                font-size: 1rem;
                font-weight: 600;
                white-space: nowrap;
                backdrop-filter: blur(4px);
                display: flex;
                align-items: center;
                gap: 0.4rem;
            }
            .phone-prefix img {
                width: 22px;
                height: 15px;
                border-radius: 2px;
            }
            #phone {
                border-radius: 0 0.375rem 0.375rem 0 !important;
                letter-spacing: 1px;
            }
            #phone::placeholder {
                letter-spacing: 0;
                opacity: 0.6;
            }
            .phone-error {
                color: #ff6b6b;
                font-size: 0.85rem;
                margin-top: 0.5rem;
                display: none;
            }
            .phone-error.show {
                display: block;
            }
            #submitButton {
                transition: all 0.3s ease;
            }
            #submitButton:not(.disabled):hover {
                transform: translateY(-1px);
                box-shadow: 0 4px 15px rgba(42, 85, 85, 0.4);
            }
        </style>
    </head>
    <body>
        <!-- Background Video-->
        <video class="bg-video" playsinline="playsinline" autoplay="autoplay" muted="muted" loop="loop"><source src="assets/mp4/bg.mp4" type="video/mp4" /></video>
        <!-- Masthead-->
        <div class="masthead">
            <div class="masthead-content text-white">
                <div class="container-fluid px-4 px-lg-0">
                    <h1 class="fst-italic lh-1 mb-4">Our Website is Coming Soon</h1>
                    <p class="mb-5">We're working hard to finish the development of this site. Drop your number below to receive updates and to be notified when we launch!</p>
                    <form id="contactForm" onsubmit="return false;">
                        <!-- Phone number input -->
                        <div class="row input-group-newsletter">
                            <div class="col">
                                <div class="phone-input-group">
                                    <span class="phone-prefix">🇬🇭 +233</span>
                                    <input class="form-control" id="phone" type="tel" placeholder="XX XXX XXXX" aria-label="Enter your Ghana phone number" maxlength="12" autocomplete="tel" />
                                </div>
                            </div>
                            <div class="col-auto"><button class="btn btn-primary disabled" id="submitButton" type="submit">Notify Me!</button></div>
                        </div>
                        <div class="phone-error" id="phoneError"></div>
                        <!-- Submit success message-->
                        <div class="d-none" id="submitSuccessMessage">
                            <div class="text-center mb-3 mt-2">
                                <div class="fw-bolder" style="color: #2ecc71;">✓ You're on the list!</div>
                                We'll text you when we launch.
                            </div>
                        </div>
                        <!-- Submit error message-->
                        <div class="d-none" id="submitErrorMessage"><div class="text-center text-danger mb-3 mt-2">Error — please try again!</div></div>
                    </form>
                </div>
            </div>
        </div>
        <!-- Social Icons-->
        <!-- For more icon options, visit https://fontawesome.com/icons?d=gallery&p=2&s=brands-->
        <div class="social-icons">
            <div class="d-flex flex-row flex-lg-column justify-content-center align-items-center h-100 mt-3 mt-lg-0">
                <a class="btn btn-dark m-3" href="#!"><i class="fab fa-twitter"></i></a>
                <a class="btn btn-dark m-3" href="#!"><i class="fab fa-facebook-f"></i></a>
                <a class="btn btn-dark m-3" href="#!"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="js/scripts.js"></script>
        <!-- Phone validation & form handling -->
        <script>
            (function () {
                const phoneInput = document.getElementById('phone');
                const submitBtn = document.getElementById('submitButton');
                const phoneError = document.getElementById('phoneError');
                const successMsg = document.getElementById('submitSuccessMessage');
                const errorMsg = document.getElementById('submitErrorMessage');
                const form = document.getElementById('contactForm');

                // Valid Ghana mobile prefixes (after 0)
                const validPrefixes = [
                    '20', '23', '24', '25', '26', '27', '28', '29', // Vodafone, MTN, AirtelTigo, etc.
                    '50', '54', '55', '56', '57', '59'              // MTN, Vodafone, AirtelTigo, Glo
                ];

                function cleanNumber(val) {
                    return val.replace(/\D/g, '');
                }

                function isValidGhanaNumber(digits) {
                    // Expect 9 or 10 digits (with or without leading 0)
                    let normalized = digits;
                    if (normalized.startsWith('0') && normalized.length === 10) {
                        normalized = normalized.substring(1);
                    }
                    if (normalized.length !== 9) return false;
                    const prefix = normalized.substring(0, 2);
                    return validPrefixes.includes(prefix);
                }

                function updateButton() {
                    const digits = cleanNumber(phoneInput.value);
                    if (digits.length >= 9) {
                        submitBtn.classList.remove('disabled');
                    } else {
                        submitBtn.classList.add('disabled');
                    }
                }

                // Format as XX XXX XXXX while typing
                phoneInput.addEventListener('input', function () {
                    let digits = cleanNumber(this.value);
                    // Remove leading 0 since we already show +233
                    if (digits.startsWith('0')) digits = digits.substring(1);
                    // Limit to 9 digits
                    if (digits.length > 9) digits = digits.substring(0, 9);
                    // Format: XX XXX XXXX
                    let formatted = '';
                    for (let i = 0; i < digits.length; i++) {
                        if (i === 2 || i === 5) formatted += ' ';
                        formatted += digits[i];
                    }
                    this.value = formatted;
                    phoneError.classList.remove('show');
                    updateButton();
                });

                // Only allow digits
                phoneInput.addEventListener('keypress', function (e) {
                    if (!/[0-9]/.test(e.key) && e.key !== 'Backspace' && e.key !== 'Delete') {
                        e.preventDefault();
                    }
                });

                submitBtn.addEventListener('click', function () {
                    if (this.classList.contains('disabled')) return;

                    const digits = cleanNumber(phoneInput.value);

                    if (!isValidGhanaNumber(digits)) {
                        phoneError.textContent = 'Please enter a valid Ghanaian phone number.';
                        phoneError.classList.add('show');
                        return;
                    }

                    // Format final number
                    const fullNumber = '+233' + digits.replace(/^0/, '');

                    // Show success
                    phoneError.classList.remove('show');
                    successMsg.classList.remove('d-none');
                    errorMsg.classList.add('d-none');
                    submitBtn.classList.add('disabled');
                    submitBtn.textContent = 'Submitted!';
                    phoneInput.disabled = true;

                    console.log('Phone submitted: ', fullNumber);
                });

                // Allow Enter key to submit
                phoneInput.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        submitBtn.click();
                    }
                });
            })();
        </script>
    </body>
</html>
